name: Publish Docker image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Track 2 smoke-test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: captionforge-ai:smoke

      - name: Run Track 2 public sample
        run: |
          mkdir -p judge-test/output
          timeout --signal=TERM --kill-after=5s 90s docker run --rm \
            -v "$GITHUB_WORKSPACE/judge-test/input:/input:ro" \
            -v "$GITHUB_WORKSPACE/judge-test/output:/output" \
            captionforge-ai:smoke

      - name: Validate Track 2 smoke-test output
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const results = JSON.parse(
            fs.readFileSync("judge-test/output/results.json", "utf8"),
          );
          const requiredKeys = [
            "formal",
            "sarcastic",
            "humorous_tech",
            "humorous_non_tech",
          ];
          const technicalConcept =
            /\b(algorithm|cpu|gpu|code|server|update|loading|deployment|bug|bandwidth|debug)\b/i;

          if (!Array.isArray(results) || results.length !== 1) {
            throw new Error("Smoke test must produce exactly one result.");
          }

          const normalizedCaptions = [];

          for (const key of requiredKeys) {
            const caption = results[0]?.captions?.[key];

            if (typeof caption !== "string" || !caption.trim()) {
              throw new Error(`Smoke test output is missing ${key}.`);
            }

            if (caption.length > 200) {
              throw new Error(`Smoke test output exceeds 200 characters for ${key}.`);
            }

            normalizedCaptions.push(caption.trim().toLowerCase());
          }

          if (new Set(normalizedCaptions).size !== requiredKeys.length) {
            throw new Error("Smoke test captions must be distinct.");
          }

          if (!technicalConcept.test(results[0].captions.humorous_tech)) {
            throw new Error("Smoke test humorous_tech caption lacks a technical concept.");
          }

          console.log("Track 2 smoke-test output is valid.");
          NODE

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/kmt9967/captionforge-ai:latest
            ghcr.io/kmt9967/captionforge-ai:track2-v4
